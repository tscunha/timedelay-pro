version: '3.8'

services:
  timeshift-api:
    build: .
    container_name: timeshift_orchestrator
    # network_mode: "host" garante que 127.0.0.1 dentro do container
    # aponta para o Nimble Streamer rodando no host.
    network_mode: "host"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NIMBLE_HOST=127.0.0.1
      - NIMBLE_PORT=8081
      # IP ou hostname público da VPS — aparece nos links SRT da UI
      - SERVER_HOST=SEU_IP_AQUI
      # Formato: tenant_id:api_key (vírgula para múltiplos tenants)
      # Gere uma chave com: openssl rand -hex 32
      - TENANT_API_KEYS=tenant123:COLOQUE_SUA_CHAVE_AQUI
    volumes:
      - timeshift_db:/app/data

volumes:
  timeshift_db:
