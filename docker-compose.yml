version: '3.8'

services:
  timeshift-api:
    build: .
    container_name: timeshift_orchestrator
    # network_mode: "host" ensures this Docker container shares the exact same IP layer as Nimble Streaming!
    # So 127.0.0.1 inside Fastify routing exactly hits Nimble Streamer's port 8081.
    network_mode: "host"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NIMBLE_HOST=127.0.0.1
      - NIMBLE_PORT=8081
    volumes:
      - timeshift_db:/app/data

volumes:
  timeshift_db:
